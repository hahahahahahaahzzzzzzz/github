databases:
  # 1. PostgreSQL Database Instance (Starter Tier)
  - name: repoleak-db
    databaseName: repoleak
    plan: starter      # Render's standard starter database plan

services:
  # 2. Redis Cache / Queue Broker (Starter Tier)
  - type: keyvalue
    name: repoleak-redis
    plan: starter      # Standard keyvalue plan
    ipAllowList: []    # Restrict to Render private network by default

  # 3. Python FastAPI Backend Service
  - type: web
    name: repoleak-backend
    env: python
    plan: starter      # Standard starter instance
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: repoleak-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: repoleak-redis
          type: keyvalue
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: SIMULATION_MODE
        value: "false"  # Set to false for live production scanning
      - key: GITHUB_TOKENS
        sync: false     # Will be filled manually in Render settings UI
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_PERSONAL_CHAT_ID
        sync: false

  # 4. Background Celery Scanning Workers
  - type: worker
    name: repoleak-worker
    env: python
    plan: starter      # Standard starter instance
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && celery -A app.workers.celery_app worker --loglevel=info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: repoleak-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: repoleak-redis
          type: keyvalue
          property: connectionString
      - key: SECRET_KEY
        fromService:
          name: repoleak-backend
          type: web
          envVarKey: SECRET_KEY

  # 5. Next.js Frontend UI Service
  - type: web
    name: repoleak-frontend
    env: node
    plan: starter      # Standard starter instance
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "cd frontend && npm run start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: repoleak-backend
          type: web
          property: host

databases:
  # PostgreSQL Database — Pro 4GB (new flexible plan)
  - name: repoleak-db
    databaseName: repoleak
    plan: pro-4gb
    postgresMajorVersion: 16
    ipAllowList: []

services:
  # Redis Cache / Queue Broker — Pro (max tier for keyvalue)
  - type: keyvalue
    name: repoleak-redis
    plan: pro
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # Python FastAPI Backend — Pro Ultra
  - type: web
    name: repoleak-backend
    runtime: python
    plan: pro ultra
    region: oregon
    numInstances: 1
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && gunicorn app.main:app --worker-class uvicorn.workers.UvicornWorker --workers 4 --threads 2 --bind 0.0.0.0:$PORT --timeout 120 --keep-alive 5 --access-logfile - --error-logfile -"
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: repoleak-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: repoleak-redis
          type: keyvalue
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: SIMULATION_MODE
        value: "false"
      - key: AUTO_SCAN_INTERVAL_SECONDS
        value: "300"
      - key: SCAN_PUBLIC_REPOS
        value: "true"
      - key: SCAN_PUBLIC_INTERVAL_SECONDS
        value: "10"
      - key: GITHUB_TOKENS
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_PERSONAL_CHAT_ID
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.3"

  # Next.js Frontend — Pro Ultra
  - type: web
    name: repoleak-frontend
    runtime: node
    plan: pro ultra
    region: oregon
    numInstances: 1
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "cd frontend && npm run start"
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: repoleak-backend
          type: web
          property: host
      - key: NODE_VERSION
        value: "20.11.0"

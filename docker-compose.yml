version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: repoleak_db
    environment:
      POSTGRES_DB: repoleak
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: DBpassword123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d repoleak"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: repoleak_queue
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: repoleak_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DATABASE_URL=postgresql://postgres:DBpassword123@postgres:5432/repoleak
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=cyberpunk-neon-glow-secret-key-321
      - SIMULATION_MODE=true
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: repoleak_worker
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:DBpassword123@postgres:5432/repoleak
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=cyberpunk-neon-glow-secret-key-321
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: repoleak_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
